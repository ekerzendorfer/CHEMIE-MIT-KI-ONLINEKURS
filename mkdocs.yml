site_name: CHEMIE mit KI Online-Kurs
site_description: Begleitkurs zur VCÖ CHemie & Schule Artikelserie 
theme:
  name: material
  language: de
  palette:
    primary: indigo
    accent: deep orange

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Startseite: index.md
  - Kapitel 1 - Eigene KI-Assistenten: kapitel1.md
