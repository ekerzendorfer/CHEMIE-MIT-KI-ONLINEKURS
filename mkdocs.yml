site_name: Mein Chemie-Kurs
site_description: Interaktive Materialien für den Chemieunterricht
theme:
  name: material
  language: de
  palette:
    primary: indigo
    accent: deep orange

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
