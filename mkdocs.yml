site_name: CHEMIE mit KI - Onlinkurs
site_description: Interaktive Materialien für den Chemieunterricht
theme:
  name: material
  language: de
  features:
    - content.code.copy
  palette:
    primary: indigo
    accent: deep orange

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Startseite: index.md
  - Kapitel 1 - Eigene KI-Assistenten: kapitel1.md
  - Exkurs - Eigene KI-Assistenten (Gems) bauen: gems.md
  - NotebookLM im NaWi-Alltag: notebooklm.md
  - Prompten lernen (ROKA): prompten.md
  - Kapitel 2 - Die Basis-Tools: kapitel2.md
  - Kapitel 3 - App in der Freistunde: kapitel3.md

plugins:
  - search
  - glightbox
